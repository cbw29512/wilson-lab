name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Set build metadata
        run: |
          echo "VITE_BUILD_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "VITE_BUILD_TIME_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Write version.json
        working-directory: frontend
        run: |
          mkdir -p public
          printf '{"sha":"%s","time_utc":"%s"}\n' "$VITE_BUILD_SHA" "$VITE_BUILD_TIME_UTC" > public/version.json

      - name: Build
        working-directory: frontend
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME_UTC: ${{ github.run_started_at }}
        run: npm run build

      - name: Sanity check dist output (must contain index.html)
        run: |
          ls -la frontend/dist
          test -f frontend/dist/index.html
          # SPA-friendly refresh support
          cp frontend/dist/index.html frontend/dist/404.html
          touch frontend/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
