name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME_UTC: ${{ github.run_started_at }}
        run: npm run build


      - name: SPA fallback (404.html) + disable Jekyll
        working-directory: frontend
        run: |
          test -f dist/index.html
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - name: Verify dist output + SPA helpers
        working-directory: frontend
        run: |
          echo "== dist contents =="
          ls -la dist || true
          test -f dist/index.html
          touch dist/.nojekyll
          cp -f dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
