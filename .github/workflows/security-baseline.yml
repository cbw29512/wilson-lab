name: Security Baseline

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan current files and Git history
        shell: bash
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          patterns = {
              "private-key": re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----"),
              "aws-access-key": re.compile(r"\b(?:AKIA|ASIA)[0-9A-Z]{16}\b"),
              "github-token": re.compile(r"\b(?:gh[pousr]_[A-Za-z0-9_]{30,255}|github_pat_[A-Za-z0-9_]{50,255})\b"),
              "slack-token": re.compile(r"\bxox[baprs]-[A-Za-z0-9-]{20,}\b"),
              "openai-anthropic-key": re.compile(r"\bsk-(?:proj-|ant-)?[A-Za-z0-9_-]{20,}\b"),
              "stripe-live-key": re.compile(r"\bsk_live_[A-Za-z0-9]{20,}\b"),
              "google-api-key": re.compile(r"\bAIza[0-9A-Za-z_-]{35}\b"),
          }
          placeholders = (
              "example", "placeholder", "replace-me", "replace_with",
              "changeme", "dummy", "sample-token", "${{ secrets.",
          )
          excluded_parts = {
              ".git", "node_modules", ".venv", "venv", "vendor",
              "dist", "build", "coverage", "__pycache__",
          }
          suspicious_names = {
              ".env", "id_rsa", "id_ed25519", "credentials.json",
              "service-account.json",
          }
          findings = set()

          def scan_line(text: str, location: str) -> None:
              lowered = text.lower()
              if any(marker in lowered for marker in placeholders):
                  return
              for label, pattern in patterns.items():
                  if pattern.search(text):
                      findings.add((location, label))

          for path in Path(".").rglob("*"):
              if not path.is_file() or any(part in excluded_parts for part in path.parts):
                  continue
              relative = path.as_posix().removeprefix("./")
              lowered_name = path.name.lower()
              if (
                  lowered_name in suspicious_names
                  or lowered_name.endswith((".pem", ".p12", ".pfx"))
                  or (lowered_name.endswith(".key") and not lowered_name.endswith(".example.key"))
              ):
                  findings.add((relative, "sensitive-filename"))
              try:
                  if path.stat().st_size > 2_000_000:
                      continue
                  raw = path.read_bytes()
                  if b"\x00" in raw:
                      continue
                  for number, line in enumerate(raw.decode("utf-8", errors="replace").splitlines(), 1):
                      scan_line(line, f"{relative}:{number}")
              except OSError:
                  continue

          process = subprocess.Popen(
              ["git", "log", "-p", "--all", "--no-ext-diff", "--no-renames", "--pretty=format:COMMIT:%H"],
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=True,
              errors="replace",
          )
          commit = "unknown"
          changed_file = "unknown"
          assert process.stdout is not None
          for raw_line in process.stdout:
              line = raw_line.rstrip("\n")
              if line.startswith("COMMIT:"):
                  commit = line.split(":", 1)[1][:12]
              elif line.startswith("+++ b/"):
                  changed_file = line[6:]
              elif line.startswith(("+", "-")) and not line.startswith(("+++", "---")):
                  scan_line(line[1:], f"history:{commit}:{changed_file}")
          _, stderr = process.communicate()
          if process.returncode != 0:
              print(stderr, file=sys.stderr)
              raise SystemExit(process.returncode)

          if findings:
              print("Potential secrets or sensitive files detected:")
              for location, label in sorted(findings):
                  print(f"- {location} [{label}]")
              print("Rotate real credentials before removing them from Git history.")
              raise SystemExit(1)

          print("No recognized secret patterns or sensitive filenames detected.")
          PY
